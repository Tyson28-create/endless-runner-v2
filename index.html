<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>live Runner 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #score {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 10px 20px; border-radius: 8px;
            font-size: 22px; font-weight: bold; z-index: 10; pointer-events: none;
        }

        #pauseBtn {
            position: absolute; top: 20px; right: 20px; padding: 10px 20px;
            font-size: 16px; background: #f59e0b; color: white; border: none;
            border-radius: 8px; cursor: pointer; z-index: 10;
        }

        #game-over-overlay {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9);
            color: white; padding: 40px; text-align: center; border-radius: 20px;
            z-index: 100; min-width: 280px; border: 2px solid #ef4444;
        }

        #restartBtn {
            padding: 15px 30px; font-size: 18px; background: #3b82f6;
            color: white; border: none; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <button id="pauseBtn">Pause</button>

    <div id="game-over-overlay">
        <h1 style="color:#ef4444">CRASHED!</h1>
        <p id="final-score">Final Score: 0</p>
        <button id="restartBtn" onclick="resetGame()">RETRY</button>
    </div>

    <canvas id="glcanvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
